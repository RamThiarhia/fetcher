name: Scrape BlastTV M3U
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      channel_ids:
        description: "Comma-separated channel IDs"
        required: false
        default: ""
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt && playwright install chromium --with-deps
      - run: python scraper.py
        env:
          CHANNEL_IDS: ${{ github.event.inputs.channel_ids }}
      - run: cat fetch.m3u
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fetch.m3u
          git diff --cached --quiet || git commit -m "update fetch.m3u [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
